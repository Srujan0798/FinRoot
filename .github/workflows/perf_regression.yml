name: perf_regression
on:
  pull_request:
    paths:
      - "src/finroot/**"
  workflow_dispatch: {}

jobs:
  perf:
    runs-on: ubuntu-latest
    env:
      FINROOT_LLM_PROVIDER: mock      # the judge-path SLO that matters (PERFORMANCE_SLOS.md)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pytest-benchmark || true
          pip install -e . || true
      - name: performance budget (Mock judge path < Minimum P95)
        run: |
          if [ -d tests/performance ] && ls tests/performance/*.py >/dev/null 2>&1; then
            pytest tests/performance -v;
          else echo "perf tests pending wave-6"; fi
