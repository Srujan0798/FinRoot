; Standalone pytest config (some tools prefer this over pyproject). Keep in sync with
; [tool.pytest.ini_options] in pyproject.toml.
[pytest]
testpaths = tests
addopts = -q
pythonpath = src
markers =
    wave1: foundation tests
    integration: cross-module tests
    e2e: end-to-end tests
    golden: hand-graded reasoning quality tests
